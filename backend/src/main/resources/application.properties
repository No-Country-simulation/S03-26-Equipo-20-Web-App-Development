spring.application.name=cms

# ==============================================================================
# CONTROL MANUAL DE INFRAESTRUCTURA
# ==============================================================================
# Deshabilitamos la auto-configuración porque nosotros definiremos los 3 DataSources
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Flyway se configurará manualmente en la carpeta config/ para manejar las 3 DBs
spring.flyway.enabled=false

# Para que Hibernate no intente validar tablas que aún no creamos
spring.jpa.hibernate.ddl-auto=none


# ==============================================================================
# CONFIGURACIÓN GLOBAL DE BASES DE DATOS (POSTGRESQL)
# ==============================================================================

# Credenciales Centralizadas (Variables de Entorno)
db.common.username=${DB_USERNAME:cms_admin}
db.common.password=${DB_PASSWORD:cms_pass_2026}
db.common.driver=org.postgresql.Driver

# Parámetros de Optimización y UTF-8
db.common.url-params=?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC

# ------------------------------------------------------------------------------
# 1. DATA SOURCE: AUTH (db_auth)
# ------------------------------------------------------------------------------
spring.datasource.auth.jdbc-url=jdbc:postgresql://localhost:5432/db_auth${db.common.url-params}
spring.datasource.auth.username=${db.common.username}
spring.datasource.auth.password=${db.common.password}
spring.datasource.auth.driver-class-name=${db.common.driver}

# 2. DATA SOURCE: USUARIOS (db_usuarios)
# ------------------------------------------------------------------------------
spring.datasource.usuarios.jdbc-url=jdbc:postgresql://localhost:5432/db_usuarios${db.common.url-params}
spring.datasource.usuarios.username=${db.common.username}
spring.datasource.usuarios.password=${db.common.password}
spring.datasource.usuarios.driver-class-name=${db.common.driver}

# 3. DATA SOURCE: CMS CORE (db_cms)
# ------------------------------------------------------------------------------
spring.datasource.cms.jdbc-url=jdbc:postgresql://localhost:5432/db_cms${db.common.url-params}
spring.datasource.cms.username=${db.common.username}
spring.datasource.cms.password=${db.common.password}
spring.datasource.cms.driver-class-name=${db.common.driver}

# ==============================================================================
# CONFIGURACIÓN HIKARI CP (Pool de Conexiones)
# ==============================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000





spring:
  application:
    name: cms
  profiles:
    active: dev

# JWT KEYS
jwt:
  key:
    signer:
      public: ${JWT_KEY_SIGNER_PUBLIC}
      private: ${JWT_KEY_SIGNER_PRIVATE}
  token:
    expiration-in-minutes: ${JWT_TOKEN_EXPIRATION}
cookie:
  jwt:
    expiration-in-days: ${COOKIE_JWT_EXPIRATION}

# - Configuración swagger
springdoc:
  swagger-ui:
    path: /docs/swagger-ui.html
    operationsSorter: method
    display-request-duration: true
  api-docs:
    path: /docs/v3/api-docs

# Información compartida para Actuator Info y Swagger
info:
  app:
    name: Testimonial CMS API
    version: 1.0.0
    description: Backend para Gestión de Testimonios (Edtech)
    server: ${server.servlet.context-path}
  
# Configuración del JWT (Para que coincida con tu filtro manual)
auth:
  cookie:
    name: jwt

# Cloudinary Config
cloudinary:
  api:
    url: https://api.cloudinary.com/v1_1

# Spring Cloud OpenFeign Resilience4j
spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      cloudinary-client:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      cloudinary-client:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 2s
    instances:
      cloudinary-client:
        baseConfig: default

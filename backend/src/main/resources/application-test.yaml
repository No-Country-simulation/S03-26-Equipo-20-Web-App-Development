spring:
  # - Configuracion de H2 para pruebas en memoria (desarrollo)
  datasource:
    url: jdbc:h2:mem:dbcms
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console